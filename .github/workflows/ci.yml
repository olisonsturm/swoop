name: swoop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[validation,cli]" && pip install pytest hypothesis pytest-benchmark
      - name: Run offline test suite
        run: python -m pytest tests/ -v -m "not live"

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Verify wheel contents
        run: |
          python -c "
          import zipfile, sys
          whl = [f for f in __import__('os').listdir('dist') if f.endswith('.whl')][0]
          zf = zipfile.ZipFile(f'dist/{whl}')
          names = zf.namelist()
          assert any('py.typed' in n for n in names), 'py.typed missing from wheel'
          assert any('__init__.py' in n for n in names), '__init__.py missing from wheel'
          print(f'Wheel OK: {len(names)} files')
          "

  publish:
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/swoop-v')
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
